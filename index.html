<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IV. Calculator</title>
    
    <!-- 全螢幕 Web App 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IV Calc">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- 配合深淺色模式嘅頂部狀態列顏色 -->
    <meta name="theme-color" content="#d1d1d6" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    
    <!-- 網頁分頁圖示 (Favicon) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIyIiBmaWxsPSIjZmZmZmZmIi8+PHRleHQgeD0iMTIiIHk9Ijc1IiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNzAiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjMDAwMDAwIiBsZXR0ZXItc3BhY2luZz0iLTIiPklWPC90ZXh0PjxjaXJjbGUgY3g9IjgyIiBjeT0iNzAiIHI9IjExIiBmaWxsPSIjZmYzYjMwIi8+PC9zdmc+">
    
    <!-- 加入 Apple Touch Icon，讓 iPhone 儲存至主畫面時顯示專屬 App Icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjIyIiBmaWxsPSIjZmZmZmZmIi8+PHRleHQgeD0iMTIiIHk9Ijc1IiBmb250LWZhbWlseT0iQXJpYWwsIHNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iNzAiIGZvbnQtd2VpZ2h0PSJib2xkIiBmaWxsPSIjMDAwMDAwIiBsZXR0ZXItc3BhY2luZz0iLTIiPklWPC90ZXh0PjxjaXJjbGUgY3g9IjgyIiBjeT0iNzAiIHI9IjExIiBmaWxsPSIjZmYzYjMwIi8+PC9zdmc+">

    <style>
        /* 極簡風格顏色變數 */
        :root {
            --bg-color: #d1d1d6;       
            --card-bg: #ffffff;        
            --text-main: #000000;      
            --text-muted: #8e8e93;     
            --accent-color: #ff3b30;   
            
            --track-bg: #e5e5ea;       
            --fill-normal: #000000;    
            --fill-max: #ff3b30;       
            
            --pill-bg: #f2f2f7;        
            --pill-active-bg: #000000;
            --pill-active-text: #ffffff;
            
            --ruler-color: rgba(0,0,0,0.15); 
            --gap-color: #ffffff;      
        }

        :root.dark-theme {
            --bg-color: #000000;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #636366;
            --accent-color: #ff453a;
            
            --track-bg: #2c2c2e;
            --fill-normal: #ffffff;
            --fill-max: #ff453a;
            
            --pill-bg: #1c1c1e;
            --pill-active-bg: #ffffff;
            --pill-active-text: #000000;
            
            --ruler-color: rgba(255,255,255,0.2);
            --gap-color: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; transition: background-color 0.3s;
            padding: 20px; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            background-color: var(--card-bg); width: 100%; max-width: 420px; 
            border-radius: 40px; 
            padding: 30px 20px; box-sizing: border-box; 
            position: relative; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: -5px;
            margin-bottom: 25px;
        }
        
        .brand {
            font-size: 28px; font-weight: 900; letter-spacing: -1px;
        }
        .brand-dot { color: var(--accent-color); }

        /* 全新 Icon 按鈕包裝器 */
        .top-controls { display: flex; gap: 15px; }
        
        .icon-btn-wrapper {
            position: relative;
            width: 28px; height: 28px;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted);
            transition: color 0.3s;
        }
        .icon-btn-wrapper:hover { color: var(--text-main); }
        .icon-btn-wrapper svg { width: 22px; height: 22px; }
        
        /* 將 Select 變成全透明，疊喺 Icon 上面 */
        .icon-btn-wrapper select {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; appearance: none; -webkit-appearance: none;
        }

        .hero-result {
            text-align: center; margin: 20px 0 40px 0;
            position: relative;
        }
        .massive-percent {
            font-size: 90px; font-weight: 800; line-height: 1;
            letter-spacing: -4px; transition: color 0.3s;
            font-variant-numeric: tabular-nums;
        }
        .pct-symbol {
            font-size: 40px; font-weight: 600; vertical-align: top;
            letter-spacing: 0; margin-left: 2px; color: var(--text-muted);
        }
        .total-stats {
            font-size: 16px; font-weight: 600; color: var(--text-muted);
            margin-top: 5px; letter-spacing: 1px;
        }
        
        .status-badge {
            display: inline-block; padding: 6px 16px; border-radius: 20px;
            font-size: 13px; font-weight: 700; margin-top: 15px;
            background: var(--pill-bg); color: var(--text-main);
            opacity: 0; transform: translateY(10px); transition: all 0.3s;
        }
        .status-badge.show { opacity: 1; transform: translateY(0); }
        .status-badge.perfect { background: var(--accent-color); color: #fff; }

        .form-selector {
            display: flex; background: var(--pill-bg);
            border-radius: 20px; padding: 4px; margin-bottom: 40px;
        }
        .form-selector label {
            flex: 1; text-align: center; cursor: pointer;
        }
        .form-selector input[type="radio"] { display: none; }
        .form-selector span {
            display: block; padding: 12px 0; font-size: 13px; font-weight: 700;
            color: var(--text-muted); border-radius: 16px; transition: all 0.2s;
        }
        .form-selector input[type="radio"]:checked + span {
            background-color: var(--pill-active-bg); color: var(--pill-active-text);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .sliders-wrapper { display: flex; flex-direction: column; gap: 30px; }
        
        .stat-group { position: relative; }
        
        .stat-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 12px;
        }
        .stat-name { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; transition: color 0.3s; }
        
        .stat-val-input {
            font-size: 24px; font-weight: 800; font-variant-numeric: tabular-nums;
            transition: color 0.3s, border-color 0.3s; line-height: 1;
            background: transparent; border: none; outline: none;
            width: 45px; text-align: right; padding: 0; margin: 0;
            color: var(--text-main); font-family: inherit;
            border-bottom: 2px solid transparent;
        }
        .stat-val-input:focus { border-bottom-color: var(--ruler-color); }
        .stat-val-input::-webkit-inner-spin-button, .stat-val-input::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .slider-container {
            position: relative; height: 40px; display: flex; align-items: center;
        }
        
        .ruler {
            position: absolute; top: -5px; left: 0; width: 100%; height: 10px;
            background-image: repeating-linear-gradient(to right, 
                var(--ruler-color) 0, var(--ruler-color) 1px, 
                transparent 1px, transparent 6.666%);
            z-index: 1; pointer-events: none;
        }

        .slider-ui {
            position: relative; width: 100%; height: 16px;
            background-color: var(--track-bg); border-radius: 8px; overflow: hidden;
            z-index: 2;
        }
        .slider-fill {
            height: 100%; width: 100%; 
            background-color: var(--fill-max); border-radius: 8px;
            transition: width 0.1s linear, background-color 0.2s;
        }
        
        .slider-gap {
            position: absolute; top: 0; width: 6px; height: 100%;
            background-color: var(--gap-color); z-index: 3;
        }
        .gap-1 { left: 33.333%; transform: translateX(-50%); }
        .gap-2 { left: 66.666%; transform: translateX(-50%); }
        
        .hidden-range {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; cursor: pointer; z-index: 10; margin: 0;
            -webkit-appearance: none; appearance: none;
        }
        .hidden-range:focus { outline: none; }
        
        .hidden-range::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 24px; height: 24px; background-color: var(--card-bg);
            border-radius: 50%; border: 2px solid var(--text-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, border-color 0.2s;
            margin-top: -4px; 
        }
        .hidden-range::-webkit-slider-thumb:active { transform: scale(1.2); }
        
        .hidden-range::-moz-range-thumb {
            width: 20px; height: 20px; background-color: var(--card-bg);
            border-radius: 50%; border: 2px solid var(--text-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.1s, border-color 0.2s;
        }
        .hidden-range::-moz-range-thumb:active { transform: scale(1.2); }

        .hidden-range.maxed::-webkit-slider-thumb { border-color: var(--accent-color); }
        .hidden-range.maxed::-moz-range-thumb { border-color: var(--accent-color); }

        .pvp-analysis {
            margin-top: 30px; padding: 15px; background-color: var(--pill-bg);
            border-radius: 16px; color: var(--text-muted);
            font-size: 13px; line-height: 1.5; font-weight: 600; text-align: center;
        }
        .pvp-analysis.highlight { background-color: var(--text-main); color: var(--card-bg); }

        .purify-hint {
            margin-top: 20px; padding: 25px 20px; border: 2px dashed var(--track-bg);
            border-radius: 24px; color: var(--text-main);
            display: none; text-align: center; background-color: transparent;
        }
        .purify-title {
            font-size: 13px; font-weight: 700; color: var(--text-muted);
            letter-spacing: 1px; margin-bottom: 12px; text-transform: uppercase;
        }
        .purify-pct {
            font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -2px;
            font-variant-numeric: tabular-nums; transition: color 0.3s;
        }
        .purify-pct-symbol { font-size: 24px; font-weight: 600; vertical-align: top; color: var(--text-muted); margin-left: 2px; }
        .purify-stats { font-size: 16px; font-weight: 700; margin-top: 12px; color: var(--text-muted); }
        .purify-stats b { color: var(--text-main); }
        .purify-hundo { 
            color: var(--accent-color); font-weight: 800; margin-top: 15px; font-size: 14px; 
            background: rgba(255, 59, 48, 0.1); display: inline-block; padding: 6px 14px; border-radius: 12px;
        }
        
        button { display: none; } 

        /* ---------------------------------------------------
           響應式橫向排版 (Desktop Horizontal Layout)
           --------------------------------------------------- */
        .content-grid { 
            display: flex; 
            flex-direction: column; 
        }
        /* 喺手機模式下，移除 col 嘅包裹，等 order 生效 */
        .col-left, .col-right { display: contents; }
        
        /* 手機版指定顯示順序 */
        .hero-result { order: 1; }
        .form-selector { order: 2; }
        .sliders-wrapper { order: 3; }
        .pvp-analysis { order: 4; }
        .purify-hint { order: 5; }

        @media (min-width: 768px) {
            .app-container { 
                max-width: 860px; 
                padding: 40px 40px; 
            }
            .content-grid {
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 60px;
            }
            .col-left, .col-right { 
                display: flex; 
                flex-direction: column; 
            }
            .col-right { 
                justify-content: center; /* 右邊內容垂直置中 */
            }
            
            /* 解除手機版順序，跟隨 HTML 左右佈局 */
            .hero-result, .form-selector, .sliders-wrapper, .pvp-analysis, .purify-hint {
                order: unset;
            }
            
            /* 微調桌面版嘅間距 */
            .hero-result { margin: 0 0 30px 0; }
            .form-selector { margin: 0 0 40px 0; }
            .pvp-analysis { margin: 0 0 20px 0; }
            .purify-hint { margin: 0; }
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <div class="brand">IV<span class="brand-dot">.</span></div>
        <div class="top-controls">
            <!-- 主題設定 Icon (半月對比圖案) -->
            <div class="icon-btn-wrapper" title="設定主題 Theme">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 2a10 10 0 0 0 0 20V2z" fill="currentColor"></path>
                </svg>
                <select id="theme-select" onchange="applyTheme()">
                    <option value="auto" id="t-theme-auto" selected>Auto</option>
                    <option value="light" id="t-theme-light">Light</option>
                    <option value="dark" id="t-theme-dark">Dark</option>
                </select>
            </div>
            
            <!-- 語言設定 Icon (地球圖案) -->
            <div class="icon-btn-wrapper" title="更換語言 Language">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                </svg>
                <select id="lang-select" onchange="changeLang()">
                    <option value="zh-HK" selected>繁體</option>
                    <option value="zh-CN">簡体</option>
                    <option value="en">EN</option>
                    <option value="ja">日本語</option>
                </select>
            </div>
        </div>
    </div>

    <!-- 內容網格：包含左右兩欄 (手機版會變成單行) -->
    <div class="content-grid">
        
        <!-- 左欄：選項與拉桿 -->
        <div class="col-left">
            <div class="form-selector">
                <label>
                    <input type="radio" name="form" value="normal" checked onchange="calculateIV()">
                    <span id="t-normal">一般</span>
                </label>
                <label>
                    <input type="radio" name="form" value="shadow" onchange="calculateIV()">
                    <span id="t-shadow">暗影</span>
                </label>
            </div>

            <div class="sliders-wrapper">
                <div class="stat-group">
                    <div class="stat-header">
                        <div class="stat-name" id="lbl-atk">攻擊</div>
                        <input type="number" id="atk-num" class="stat-val-input" min="0" max="15" value="15" tabindex="1" inputmode="numeric" pattern="[0-9]*" onfocus="this.value=''" onblur="if(this.value===''){this.value='0'; syncFromInput('atk');}" oninput="syncFromInput('atk')">
                    </div>
                    <div class="slider-container">
                        <div class="ruler"></div>
                        <div class="slider-ui">
                            <div class="slider-fill" id="atk-fill"></div>
                            <div class="slider-gap gap-1"></div>
                            <div class="slider-gap gap-2"></div>
                        </div>
                        <input type="range" id="atk-range" min="0" max="15" value="15" tabindex="-1" class="hidden-range" oninput="syncFromRange('atk')">
                    </div>
                </div>
                
                <div class="stat-group">
                    <div class="stat-header">
                        <div class="stat-name" id="lbl-def">防禦</div>
                        <input type="number" id="def-num" class="stat-val-input" min="0" max="15" value="15" tabindex="2" inputmode="numeric" pattern="[0-9]*" onfocus="this.value=''" onblur="if(this.value===''){this.value='0'; syncFromInput('def');}" oninput="syncFromInput('def')">
                    </div>
                    <div class="slider-container">
                        <div class="ruler"></div>
                        <div class="slider-ui">
                            <div class="slider-fill" id="def-fill"></div>
                            <div class="slider-gap gap-1"></div>
                            <div class="slider-gap gap-2"></div>
                        </div>
                        <input type="range" id="def-range" min="0" max="15" value="15" tabindex="-1" class="hidden-range" oninput="syncFromRange('def')">
                    </div>
                </div>
                
                <div class="stat-group">
                    <div class="stat-header">
                        <div class="stat-name" id="lbl-hp">HP</div>
                        <input type="number" id="hp-num" class="stat-val-input" min="0" max="15" value="15" tabindex="3" inputmode="numeric" pattern="[0-9]*" onfocus="this.value=''" onblur="if(this.value===''){this.value='0'; syncFromInput('hp');}" oninput="syncFromInput('hp')">
                    </div>
                    <div class="slider-container">
                        <div class="ruler"></div>
                        <div class="slider-ui">
                            <div class="slider-fill" id="hp-fill"></div>
                            <div class="slider-gap gap-1"></div>
                            <div class="slider-gap gap-2"></div>
                        </div>
                        <input type="range" id="hp-range" min="0" max="15" value="15" tabindex="-1" class="hidden-range" oninput="syncFromRange('hp')">
                    </div>
                </div>
            </div>
        </div>

        <!-- 右欄：計算結果與分析 -->
        <div class="col-right">
            <div class="hero-result">
                <div class="massive-percent" id="percent-text">100<span class="pct-symbol">%</span></div>
                <div class="total-stats" id="total-text">45 / 45</div>
                <div id="comment" class="status-badge"></div>
            </div>
            
            <div id="pvp-analysis" class="pvp-analysis"></div>
            <div id="purify-hint" class="purify-hint"></div>
        </div>

    </div>
</div>

<script>
    function applyTheme() {
        const theme = document.getElementById('theme-select').value;
        const root = document.documentElement;
        if (theme === 'dark') { root.classList.add('dark-theme'); } 
        else if (theme === 'light') { root.classList.remove('dark-theme'); } 
        else {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                root.classList.add('dark-theme');
            } else { root.classList.remove('dark-theme'); }
        }
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if (document.getElementById('theme-select').value === 'auto') { applyTheme(); }
    });

    const langDict = {
        'zh-HK': { normal: "一般", shadow: "暗影", atk: "攻擊", def: "防禦", hp: "HP", hundo: "PERFECT IV", nundo: "ZERO IV", good: "EXCELLENT", pTitle: "淨化預測", pAtk: "攻", pDef: "防", pHp: "血", pTotal: "總計", pHundo: "淨化後 100% 完美", themeAuto: "Auto", themeLight: "Light", themeDark: "Dark", pvpGLUL: "適合 超級 / 高級聯盟", pvpML: "適合 大師聯盟 / 團體戰", pvpNone: "一般體質 (作交換或傳送用)" },
        'zh-CN': { normal: "一般", shadow: "暗影", atk: "攻击", def: "防御", hp: "HP", hundo: "PERFECT IV", nundo: "ZERO IV", good: "EXCELLENT", pTitle: "净化预测", pAtk: "攻", pDef: "防", pHp: "血", pTotal: "总计", pHundo: "净化后 100% 完美", themeAuto: "Auto", themeLight: "Light", themeDark: "Dark", pvpGLUL: "适合 超级 / 高级联盟", pvpML: "适合 大师联盟 / 团体战", pvpNone: "一般体质 (作交换或传送用)" },
        'en': { normal: "Normal", shadow: "Shadow", atk: "ATTACK", def: "DEFENSE", hp: "HP", hundo: "HUNDO", nundo: "NUNDO", good: "EXCELLENT", pTitle: "Purified Stats", pAtk: "Atk", pDef: "Def", pHp: "HP", pTotal: "Total", pHundo: "100% Hundo if Purified", themeAuto: "Auto", themeLight: "Light", themeDark: "Dark", pvpGLUL: "Great / Ultra League Potential", pvpML: "Master League / Raid Attacker", pvpNone: "Average Stats (Trade/Transfer)" },
        'ja': { normal: "通常", shadow: "シャドウ", atk: "攻撃", def: "防御", hp: "HP", hundo: "PERFECT", nundo: "ZERO", good: "EXCELLENT", pTitle: "ライト化予測", pAtk: "攻", pDef: "防", pHp: "HP", pTotal: "合計", pHundo: "ライト化で 100%", themeAuto: "Auto", themeLight: "Light", themeDark: "Dark", pvpGLUL: "スーパー / ハイパーリーグ", pvpML: "マスター / レイド", pvpNone: "通常個体" }
    };
    let currentLang = 'zh-HK';

    function changeLang() {
        currentLang = document.getElementById('lang-select').value;
        let t = langDict[currentLang];
        document.getElementById('t-normal').innerText = t.normal;
        document.getElementById('t-shadow').innerText = t.shadow;
        document.getElementById('lbl-atk').innerText = t.atk;
        document.getElementById('lbl-def').innerText = t.def;
        document.getElementById('lbl-hp').innerText = t.hp;
        document.getElementById('t-theme-auto').innerText = t.themeAuto;
        document.getElementById('t-theme-light').innerText = t.themeLight;
        document.getElementById('t-theme-dark').innerText = t.themeDark;
        calculateIV(); 
    }

    function syncFromInput(stat) {
        let numInput = document.getElementById(stat + '-num');
        let rangeInput = document.getElementById(stat + '-range');
        let rawVal = parseInt(numInput.value);
        let val = isNaN(rawVal) ? 0 : rawVal; 
        
        if (val > 15) { val = 15; numInput.value = 15; }
        if (val < 0) { val = 0; numInput.value = 0; }
        
        rangeInput.value = val;
        updateVisuals(stat, val, numInput);
    }

    function syncFromRange(stat) {
        let numInput = document.getElementById(stat + '-num');
        let rangeInput = document.getElementById(stat + '-range');
        let val = parseInt(rangeInput.value);
        
        numInput.value = val;
        updateVisuals(stat, val, numInput);
    }

    function updateVisuals(stat, val, numInput) {
        const fillEl = document.getElementById(stat + '-fill');
        const labelRow = document.getElementById('lbl-' + stat);
        const rangeInput = document.getElementById(stat + '-range');
        
        fillEl.style.width = ((val / 15) * 100) + '%';
        
        if (val === 15) {
            fillEl.style.backgroundColor = 'var(--fill-max)';
            numInput.style.color = 'var(--accent-color)';
            labelRow.style.color = 'var(--accent-color)';
            rangeInput.classList.add('maxed');
        } else {
            fillEl.style.backgroundColor = 'var(--fill-normal)';
            numInput.style.color = 'var(--text-main)';
            labelRow.style.color = 'var(--text-main)';
            rangeInput.classList.remove('maxed');
        }

        calculateIV(); 
    }

    function calculateIV() {
        let atk = parseInt(document.getElementById('atk-num').value) || 0;
        let def = parseInt(document.getElementById('def-num').value) || 0;
        let hp = parseInt(document.getElementById('hp-num').value) || 0;
        let form = document.querySelector('input[name="form"]:checked').value;
        let t = langDict[currentLang]; 

        let total = atk + def + hp;
        let percentage = ((total / 45) * 100).toFixed(1);

        document.getElementById('total-text').innerText = total + " / 45";
        
        let displayPercent = percentage.endsWith('.0') ? parseInt(percentage) : percentage;
        let pctTextEl = document.getElementById('percent-text');
        pctTextEl.innerHTML = displayPercent + '<span class="pct-symbol">%</span>';

        if (total === 45) {
            pctTextEl.style.color = 'var(--accent-color)';
        } else {
            pctTextEl.style.color = 'var(--text-main)';
        }

        let commentDiv = document.getElementById('comment');
        commentDiv.className = 'status-badge'; 
        if (total === 45) {
            commentDiv.innerHTML = t.hundo; 
            commentDiv.classList.add('show', 'perfect');
        } else if (total === 0) {
            commentDiv.innerHTML = t.nundo;
            commentDiv.classList.add('show');
        } else if (percentage >= 90) {
            commentDiv.innerHTML = t.good;
            commentDiv.classList.add('show');
        }

        let pvpDiv = document.getElementById('pvp-analysis');
        let pvpText = "";
        let isGLUL = (atk <= 5 && def >= 12 && hp >= 12);
        let isML = (total >= 40);

        pvpDiv.className = 'pvp-analysis'; 
        if (isGLUL) { pvpText = t.pvpGLUL; pvpDiv.classList.add('highlight'); } 
        else if (isML) { pvpText = t.pvpML; pvpDiv.classList.add('highlight'); } 
        else { pvpText = t.pvpNone; }
        
        pvpDiv.innerHTML = pvpText;

        let purifyHintDiv = document.getElementById('purify-hint');
        if (form === 'shadow') {
            let pAtk = Math.min(15, atk + 2); let pDef = Math.min(15, def + 2); let pHp = Math.min(15, hp + 2);
            let pTotal = pAtk + pDef + pHp; let pPercent = ((pTotal / 45) * 100).toFixed(1);
            let pDisplayPercent = pPercent.endsWith('.0') ? parseInt(pPercent) : pPercent;
            
            let isPerfect = pTotal === 45;

            let hintText = `
                <div class="purify-title">${t.pTitle}</div>
                <div class="purify-pct" style="color: ${isPerfect ? 'var(--accent-color)' : 'var(--text-main)'}">${pDisplayPercent}<span class="purify-pct-symbol">%</span></div>
                <div class="purify-stats">${t.pAtk} <b>${pAtk}</b> / ${t.pDef} <b>${pDef}</b> / ${t.pHp} <b>${pHp}</b> <span style="font-size:14px; margin-left:8px;">(${t.pTotal}: <b>${pTotal}</b>/45)</span></div>
            `;
            
            if (isPerfect && total < 45) { 
                hintText += `<div class="purify-hundo">${t.pHundo}</div>`; 
            }
            
            purifyHintDiv.innerHTML = hintText;
            purifyHintDiv.style.display = 'block';
        } else {
            purifyHintDiv.style.display = 'none';
        }
    }

    window.onload = function() {
        applyTheme();
        syncFromRange('atk');
        syncFromRange('def');
        syncFromRange('hp');
    }
</script>

</body>
</html>
